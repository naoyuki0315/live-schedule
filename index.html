<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE SCHEDULE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗓️</text></svg>">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-bg-container text-center text-white position-relative">
        <img src="your-header-image.jpg" alt="Live Schedule" class="header-img w-100 object-fit-cover">
        <div id="maskLeft" class="mask-layer position-absolute top-0 start-0 h-100"></div>
        <div id="maskRight" class="mask-layer position-absolute top-0 end-0 h-100"></div>
    </div>

    <div class="container my-4">
        <div class="d-flex justify-content-center gap-2 mb-4">
            <button id="btn-list" class="btn btn-outline-primary active" onclick="setView('list')">リスト表示</button>
            <button id="btn-cal" class="btn btn-outline-primary" onclick="setView('calendar')">カレンダー表示</button>
        </div>

        <div id="bandTabs" class="d-flex justify-content-center gap-2 mb-3">
            <button class="btn btn-sm btn-outline-secondary active" onclick="switchTab('ALL')">総合</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="switchTab('DROP DOWN MAMA')">DROP DOWN MAMA</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="switchTab('2120 BLUES BAND')">2120 BLUES BAND</button>
        </div>

        <div id="list-view-container">
            <div id="live-count-list" class="alert alert-info text-center fw-bold mb-3"></div>
            <div id="list-view" class="row"></div>
        </div>

        <div id="calendar-view" class="d-none">
            <div id="live-count-calendar" class="alert alert-info text-center fw-bold mb-3"></div>
            <div id="calendar" class="p-2 border rounded bg-white shadow-sm"></div>
        </div>

        <div id="detail-view" class="d-none">
            <div class="mb-3">
                <button class="btn btn-secondary btn-sm" onclick="closeDetailView()">&lt; 戻る</button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
