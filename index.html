<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ライブスケジュール</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="header-container">
        <img src="image.png" alt="LIVE SCHEDULE" class="header-img" id="headerImage">
        <div class="mask mask-left" id="maskLeft"></div>
        <div class="mask mask-right" id="maskRight"></div>
    </div>

    <div class="container py-4">
        <ul class="nav nav-pills justify-content-center mb-4" id="bandTabs">
            <li class="nav-item"><button class="nav-item nav-link active" onclick="switchTab('ALL')">総合スケジュール</button></li>
            <li class="nav-item"><button class="nav-item nav-link" onclick="switchTab('DROP DOWN MAMA')">DROP DOWN MAMA</button></li>
            <li class="nav-item"><button class="nav-item nav-link" onclick="switchTab('2120 BLUES BAND')">2120 BLUES BAND</button></li>
            <li class="nav-item"><button class="nav-item nav-link" onclick="switchTab('スズナPA')">スズナPA</button></li>
        </ul>

        <div class="text-center mb-4">
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-secondary active" id="btn-list" onclick="setView('list')">リスト表示</button>
                <button type="button" class="btn btn-outline-secondary" id="btn-cal" onclick="setView('calendar')">カレンダー表示</button>
            </div>
        </div>

        <div id="list-view" class="row justify-content-center"></div>
        <div id="calendar-view" class="bg-white p-3 rounded shadow-sm d-none">
            <div id="calendar"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
