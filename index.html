<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE SCHEDULE</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗓️</text></svg>">
    
    <link rel="apple-touch-icon" href="app-icon.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    
    <style>
        /* 以前お気に入りだった横長サイズ感を完全に再現 */
        .header-bg-container {
            width: 100%;
            height: 220px; /* お気に入りの高さ */
            overflow: hidden;
            position: relative;
            background-color: #000;
        }
        .header-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 元の横長デザインをきれいに引き伸ばす設定に戻しました */
        }
        /* 左右のタップを検知する透明マスク */
        .mask-layer {
            width: 50%;
            height: 100%;
            background-color: #000;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        
        /* カードのホバー効果 */
        .live-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .live-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
        }
        
        /* アニメーション */
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* バンド別カラー（バッジ用） */
        .bg-dropdown-mama { background-color: #1a365d !important; color: white; }
        .bg-2120-blues { background-color: #800020 !important; color: white; }
        .bg-suzuna-pa { background-color: #00ced1 !important; color: black; }
        .bg-default-band { background-color: #4a5568 !important; color: white; }
    </style>
</head>
<body class="bg-light">

    <div class="header-bg-container text-center position-relative">
        <img src="image.png" alt="Live Schedule" class="header-img">
        <div id="maskLeft" class="mask-layer position-absolute top-0 start-0"></div>
        <div id="maskRight" class="mask-layer position-absolute top-0 end-0"></div>
    </div>

    <div class="container my-4" style="max-width: 800px;">
        <div class="d-flex justify-content-center gap-2 mb-4">
            <button id="btn-list" class="btn btn-outline-primary active" onclick="setView('list')">リスト表示</button>
            <button id="btn-cal" class="btn btn-outline-primary" onclick="setView('calendar')">カレンダー表示</button>
        </div>

        <div id="bandTabs" class="d-flex justify-content-center gap-2 mb-3 d-none">
            <button class="btn btn-sm btn-outline-secondary active" onclick="switchTab('ALL')">総合</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="switchTab('DROP DOWN MAMA')">DROP DOWN MAMA</button>
            <button class="btn btn-sm btn-outline-secondary" onclick="switchTab('2120 BLUES BAND')">2120 BLUES BAND</button>
        </div>

        <div id="list-view-container">
            <div id="live-count-list" class="alert alert-info text-center fw-bold mb-3"></div>
            <div id="list-view" class="row"></div>
        </div>

        <div id="calendar-view" class="d-none">
            <div id="live-count-calendar" class="alert alert-info text-center fw-bold mb-3"></div>
            <div id="calendar" class="p-2 border rounded bg-white shadow-sm"></div>
        </div>

        <div id="detail-view" class="d-none animate-fade-in">
            <div class="mb-3">
                <button class="btn btn-secondary btn-sm shadow-sm" onclick="closeDetailView()">◀ 戻る</button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
